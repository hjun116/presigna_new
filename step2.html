<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presigna — Partner Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }, colors: { brand: '#7B61FF', dark: '#0D0D12', card: '#16161D' } } }
    }
  </script>
  <style>
    body { background-color: #0D0D12; color: white; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .font-display { font-family: 'DM Sans', system-ui, sans-serif; letter-spacing: -0.01em; }
    .premium-blur { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-in      { animation: fadeIn  0.3s ease-out; }
    .scale-in-center { animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0D0D12; }
    ::-webkit-scrollbar-thumb { background: #1F1F29; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #7B61FF; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx2O22ViMQtwS16wlYEZhKHU7tJNuuYzTYfTi4y3LAh7zzfCUtn163WayDvoMoNQWnLSQ/exec';

    // 로컬 스토리지 데이터 가져오기 헬퍼
    const getStoredUser = () => {
      try {
        const raw = localStorage.getItem('presigna_user');
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    };

    // API 통신 모듈화 (DRY 원칙 적용 및 에러 캡처)
    const submitToAPI = async (payload) => {
      try {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(payload).toString()
        });
        return true;
      } catch (error) {
        console.error('API Submission Failed:', error);
        return false;
      }
    };

    // React 충돌 방지용 안전한 Icon 래퍼 (가장 중요)
    const Icon = ({ name, size = 24, className = '' }) => {
      const spanRef = useRef(null);

      useEffect(() => {
        if (spanRef.current) {
          // React Virtual DOM 영역을 벗어난 안전한 곳에서 Vanilla JS 조작
          spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
          lucide.createIcons({
            attrs: { width: size, height: size },
            nodes: [spanRef.current.querySelector('i')]
          });
        }
      }, [name, size, className]);

      return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} />;
    };

    const App = () => {
      const [user, setUser] = useState({ name: '', email: '' });
      const [partners, setPartners] = useState(['', '', '']);
      const [formStatus, setFormStatus] = useState({ loading: false, error: '' });
      const [showModal, setShowModal] = useState(false);

      useEffect(() => {
        const stored = getStoredUser();
        if (!stored) {
          window.location.href = 'index.html';
          return;
        }
        setUser({ name: stored.name, email: stored.email });
      }, []);

      const handlePartnerChange = (index, value) => {
        const next = [...partners];
        next[index] = value;
        setPartners(next);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setFormStatus({ loading: true, error: '' });

        const filled = partners.filter(p => p.trim().length > 0);
        if (filled.length === 0) {
          setFormStatus({ loading: false, error: 'Please enter at least one target company.' });
          return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!user.email || !emailRegex.test(user.email)) {
          setFormStatus({ loading: false, error: 'Stored email is invalid. Please relogin.' });
          return;
        }

        const success = await submitToAPI({
          name: user.name,
          email: user.email,
          partner1: partners[0].trim(),
          partner2: partners[1].trim(),
          partner3: partners[2].trim()
        });

        if (success) {
          setShowModal(true);
          setFormStatus({ loading: false, error: '' });
        } else {
          setFormStatus({ loading: false, error: 'Network error. Please check your connection and try again.' });
        }
      };

      const trackClick = async (actionName, url) => {
        // 비동기로 백그라운드 추적 전송 후 페이지 이동
        submitToAPI({ action: actionName, name: user.name, email: user.email });
        window.open(url, '_blank', 'noopener,noreferrer');
      };

      const handleLogout = () => {
        try { localStorage.removeItem('presigna_user'); } catch (e) {}
        window.location.href = 'index.html';
      };

      return (
        <div className="min-h-screen selection:bg-[#7B61FF]/30 selection:text-white">
          {/* Navigation */}
          <nav className="px-6 py-5 flex items-center justify-between sticky top-0 bg-[#0D0D12]/85 premium-blur z-20 border-b border-white/5 relative">
            <button onClick={handleLogout} className="p-2 hover:bg-white/5 rounded-full transition-colors border border-white/5 z-10" title="Back to home">
              <Icon name="chevron-left" size={20} />
            </button>
            <span className="absolute left-1/2 -translate-x-1/2 font-display text-[1.2rem] font-bold text-white tracking-tight select-none">
              presigna<span className="text-[#7B61FF] text-xl leading-none">.</span>
            </span>
            {user.name && (
              <div className="flex items-center gap-2.5 px-3 py-1.5 rounded-full bg-white/5 border border-white/10">
                <div className="w-6 h-6 rounded-full bg-[#7B61FF]/30 border border-[#7B61FF]/40 flex items-center justify-center">
                  <Icon name="user" size={12} className="text-[#9D8BFF]" />
                </div>
                <span className="text-xs font-semibold text-slate-300 hidden sm:block max-w-[140px] truncate">{user.name}</span>
              </div>
            )}
          </nav>

          <main className="max-w-xl mx-auto px-6 pb-20 space-y-10">
            {/* Header */}
            <header className="flex flex-col items-center text-center space-y-5 py-10">
              <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-[#7B61FF]/40 bg-[#7B61FF]/10 text-[#9D8BFF] text-[10px] font-bold uppercase tracking-[0.2em]">
                <span className="w-1.5 h-1.5 rounded-full bg-[#7B61FF] animate-pulse"></span>
                Partnering Intelligence
              </div>
              <h1 className="font-display text-4xl sm:text-5xl font-black leading-[1.15] tracking-tight">
                Strategic Insights for <br/>
                <span className="text-[#7B61FF]">BIO KOREA 2026</span>
              </h1>
              <p className="text-slate-400 text-sm font-medium">
                Welcome back, <span className="text-white font-semibold">{user.name}</span>
              </p>
              <p className="text-gray-500 text-sm max-w-xs font-medium leading-relaxed">
                Unlock exclusive data and competitive trackers designed for high-stakes deal making.
              </p>
            </header>

            {/* Form Section */}
            <section className="bg-card rounded-[28px] p-8 border border-white/10 shadow-2xl relative overflow-hidden">
              <div className="absolute top-0 right-0 w-40 h-40 bg-[#7B61FF]/8 blur-[60px] rounded-full -mr-10 -mt-10 pointer-events-none"></div>

              <div className="flex items-start gap-5 mb-8 relative z-10">
                <div className="p-3.5 bg-[#7B61FF]/15 rounded-2xl border border-[#7B61FF]/20 flex items-center justify-center shrink-0">
                  <Icon name="target" size={28} className="text-[#7B61FF]" />
                </div>
                <div>
                  <h2 className="text-xl font-bold tracking-tight">Tailored Partner Intelligence</h2>
                  <p className="text-gray-400 text-[13px] mt-1.5 leading-relaxed font-medium">
                    Boardroom-ready strategic overviews of your specific target companies.
                  </p>
                </div>
              </div>

              <form onSubmit={handleSubmit} className="space-y-6 relative z-10" noValidate>
                <div className="space-y-3">
                  <label className="text-[10px] font-bold text-gray-500 uppercase tracking-[0.15em] ml-1 block">Registered Email</label>
                  <div className="w-full bg-[#0D0D12] border border-white/5 rounded-2xl px-5 py-4 text-sm font-medium text-slate-400 flex items-center justify-between">
                    <span className="truncate">{user.email || '—'}</span>
                    <Icon name="shield-check" size={14} className="text-[#7B61FF] shrink-0 ml-2" />
                  </div>
                </div>

                <div className="space-y-3">
                  <label className="text-[10px] font-bold text-gray-500 uppercase tracking-[0.15em] ml-1 block">Target Companies</label>
                  <div className="space-y-3">
                    {partners.map((partner, index) => (
                      <input
                        key={index}
                        type="text"
                        placeholder={`Partner ${index + 1}`}
                        value={partner}
                        onChange={(e) => handlePartnerChange(index, e.target.value)}
                        className="w-full bg-[#0D0D12] border border-white/10 rounded-2xl px-5 py-4 text-base focus:outline-none focus:border-[#7B61FF] focus:ring-1 focus:ring-[#7B61FF] transition-all placeholder:text-gray-700 font-medium text-white"
                      />
                    ))}
                  </div>
                </div>

                {formStatus.error && (
                  <p className="text-red-400 text-xs font-medium px-1">{formStatus.error}</p>
                )}

                <button
                  type="submit"
                  disabled={formStatus.loading}
                  className="w-full bg-[#7B61FF] hover:bg-[#6a50ee] disabled:opacity-50 text-white font-extrabold py-5 rounded-2xl shadow-lg shadow-[#7B61FF]/25 transition-all active:scale-[0.97] flex items-center justify-center gap-3 text-base tracking-tight border border-[#7B61FF]/40"
                >
                  {formStatus.loading ? 'Processing...' : 'Request Analysis Report'}
                  {!formStatus.loading && <Icon name="send" size={18} />}
                </button>
              </form>
            </section>

            {/* External Links */}
            <div className="space-y-4">
              <button onClick={() => trackClick('Preclinical Data Explorer', 'https://presigna-preclinical-data-explorer.streamlit.app/')} className="w-full group text-left bg-card rounded-[24px] p-7 border border-white/10 hover:border-[#7B61FF]/50 transition-all flex items-center justify-between shadow-lg">
                <div className="flex items-center gap-5">
                  <div className="p-3 bg-[#7B61FF]/10 rounded-xl text-[#7B61FF] group-hover:bg-[#7B61FF] group-hover:text-white transition-all flex items-center justify-center">
                    <Icon name="flask-conical" size={26} />
                  </div>
                  <div>
                    <h2 className="text-base font-bold group-hover:text-[#7B61FF] transition-colors tracking-tight">Preclinical Data Explorer</h2>
                    <p className="text-gray-500 text-[12px] font-medium mt-0.5">Deep-dive into early-stage asset data.</p>
                  </div>
                </div>
                <div className="p-2 rounded-xl bg-white/5 text-gray-600 group-hover:text-[#7B61FF] group-hover:bg-[#7B61FF]/10 transition-all shrink-0">
                  <Icon name="external-link" size={18} />
                </div>
              </button>

              <button onClick={() => trackClick('Clinical Pipeline Tracker', 'https://presigna-clinical-pipeline-tracker.streamlit.app/')} className="w-full group text-left bg-card rounded-[24px] p-7 border border-white/10 hover:border-[#7B61FF]/50 transition-all flex items-center justify-between shadow-lg">
                <div className="flex items-center gap-5">
                  <div className="p-3 bg-[#7B61FF]/10 rounded-xl text-[#7B61FF] group-hover:bg-[#7B61FF] group-hover:text-white transition-all flex items-center justify-center">
                    <Icon name="stethoscope" size={26} />
                  </div>
                  <div>
                    <h2 className="text-base font-bold group-hover:text-[#7B61FF] transition-colors tracking-tight">Clinical Development Tracker</h2>
                    <p className="text-gray-500 text-[12px] font-medium mt-0.5">Real-time monitoring of trial progression.</p>
                  </div>
                </div>
                <div className="p-2 rounded-xl bg-white/5 text-gray-600 group-hover:text-[#7B61FF] group-hover:bg-[#7B61FF]/10 transition-all shrink-0">
                  <Icon name="external-link" size={18} />
                </div>
              </button>
            </div>
          </main>

          {/* Footer */}
          <footer className="py-14 text-center border-t border-white/5">
            <p className="text-gray-600 text-[10px] font-bold tracking-[0.3em] uppercase">Presigna • Precision Intelligence Engine</p>
          </footer>

          {/* Success Modal */}
          {showModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/90 premium-blur animate-in">
              <div className="bg-card w-full max-w-sm rounded-[36px] p-10 border border-white/10 relative shadow-2xl scale-in-center">
                <button onClick={() => setShowModal(false)} className="absolute top-7 right-7 text-gray-500 hover:text-white transition-colors p-1">
                  <Icon name="x" size={22} />
                </button>
                <div className="flex flex-col items-center text-center space-y-6">
                  <div className="w-20 h-20 bg-[#7B61FF]/15 rounded-full flex items-center justify-center text-[#7B61FF] border border-[#7B61FF]/20">
                    <Icon name="check-circle-2" size={40} />
                  </div>
                  <div className="space-y-3">
                    <h3 className="text-2xl font-black tracking-tight">Request Received</h3>
                    <p className="text-gray-400 text-sm leading-relaxed font-medium">
                      We are now analyzing your target partners.<br/>
                      Your custom report will be sent to <span className="text-[#7B61FF] font-semibold">{user.email}</span> within 24 hours.
                    </p>
                  </div>
                  <button onClick={() => setShowModal(false)} className="w-full py-4 bg-white/5 hover:bg-white/10 text-white rounded-2xl font-bold transition-all border border-white/5 active:scale-95 text-sm tracking-wide">
                    Got it
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
